# Netlify configuration file for CrackNest Mono-Repo

[build]
  # Tell Netlify that the React code is inside the frontend folder
  base = "frontend"
  
  # The command to run to build the site
  command = "npm run build"
  
  # The directory where Vite outputs the build files (relative to the base directory)
  publish = "dist"

# Handle routing for single page application (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
